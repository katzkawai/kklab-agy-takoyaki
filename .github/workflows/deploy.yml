# このワークフローの名前（GitHubの「Actions」タブに表示されます）
name: Deploy to GitHub Pages

# ワークフローを実行する条件（トリガー）を定義します
on:
  # mainブランチにコードがプッシュされたときに実行します
  push:
    branches:
      - main
  # GitHubの画面から手動で実行できるようにします
  workflow_dispatch:

# ジョブの実行に必要な各種権限（パーミッション）を設定します
permissions:
  contents: read      # リポジトリ内のコードを読み取る権限
  pages: write         # GitHub Pagesへ書き込み（デプロイ）する権限
  id-token: write      # セキュリティ連携に必要な識別トークンの書き込み権限

# 同時に複数のデプロイ処理が走るのを防ぐ設定です
concurrency:
  group: 'pages'       # 同じグループ名「pages」での実行を制御します
  cancel-in-progress: true # 新しいビルドが始まったら、古いビルドは途中でキャンセルします

# 具体的な実行タスク（ジョブ）を定義します
jobs:
  # 「deploy」という名前のジョブを定義します
  deploy:
    # デプロイ環境の定義（GitHub上にリンクが表示されるようになります）
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }} # 最終的にデプロイされたページのURLを出力します
    
    # 処理を実行する仮想サーバーのOS（Ubuntuの最新版）を指定します
    runs-on: ubuntu-latest
    
    # サーバー上で実行する一連の処理ステップです
    steps:
      # ステップ1: リポジトリのコードを仮想サーバーにダウンロード（チェックアウト）します
      - name: Checkout
        uses: actions/checkout@v4

      # ステップ2: 仮想サーバーにNode.jsの実行環境をセットアップします
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20   # Node.jsのバージョン20を使用します
          cache: 'npm'       # パッケージ情報のキャッシュを有効にして処理速度を上げます

      # ステップ3: package.jsonに基づいて、必要なライブラリ（Viteなど）を厳密にインストールします
      # (npm installより厳密で高速な「npm ci」を使用します)
      - name: Install dependencies
        run: npm ci

      # ステップ4: アプリケーションをビルド（HTML/CSS/JSを公開用の単一データへ変換）します
      # (結果として「dist」というフォルダが作成され、公開ファイルが生成されます)
      - name: Build
        run: npm run build

      # ステップ5: GitHub Pagesの公開環境に合わせた内部設定を行います
      - name: Setup Pages
        uses: actions/configure-pages@v4

      # ステップ6: ビルドで作成された「dist」フォルダを公開用のアセット（成果物）としてアップロードします
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'    # 公開対象となるフォルダパスを指定します

      # ステップ7: アップロードされたアセットを最終的にGitHub Pagesサーバーへデプロイ（公開）します
      - name: Deploy to GitHub Pages
        id: deployment      # このステップの出力を参照できるようにIDを設定します
        uses: actions/deploy-pages@v4
